<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
</head>
<body>
  <h1>BossSay Icon Generator</h1>
  <p>Right-click each canvas and "Save image as..." to download the icons.</p>
  <div>
    <h3>icon16.png</h3>
    <canvas id="c16" width="16" height="16"></canvas>
  </div>
  <div>
    <h3>icon48.png</h3>
    <canvas id="c48" width="48" height="48"></canvas>
  </div>
  <div>
    <h3>icon128.png</h3>
    <canvas id="c128" width="128" height="128"></canvas>
  </div>

  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const s = canvas.width;

      // 背景渐变
      const grad = ctx.createLinearGradient(0, 0, s, s);
      grad.addColorStop(0, '#667eea');
      grad.addColorStop(1, '#764ba2');

      // 圆角矩形
      const r = s * 0.18;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(s - r, 0);
      ctx.quadraticCurveTo(s, 0, s, r);
      ctx.lineTo(s, s - r);
      ctx.quadraticCurveTo(s, s, s - r, s);
      ctx.lineTo(r, s);
      ctx.quadraticCurveTo(0, s, 0, s - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // 消息气泡
      const m = s * 0.22;
      const bw = s - m * 2;
      const bh = s * 0.48;
      const bt = s * 0.22;
      const br = s * 0.08;

      ctx.beginPath();
      ctx.moveTo(m + br, bt);
      ctx.lineTo(m + bw - br, bt);
      ctx.quadraticCurveTo(m + bw, bt, m + bw, bt + br);
      ctx.lineTo(m + bw, bt + bh - br);
      ctx.quadraticCurveTo(m + bw, bt + bh, m + bw - br, bt + bh);
      ctx.lineTo(m + bw * 0.65, bt + bh);
      ctx.lineTo(m + bw * 0.5, bt + bh + s * 0.12);
      ctx.lineTo(m + bw * 0.5, bt + bh);
      ctx.lineTo(m + br, bt + bh);
      ctx.quadraticCurveTo(m, bt + bh, m, bt + bh - br);
      ctx.lineTo(m, bt + br);
      ctx.quadraticCurveTo(m, bt, m + br, bt);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fill();

      // AI 闪电
      const cx = s * 0.5;
      const cy = s * 0.44;
      const ls = s * 0.18;

      ctx.beginPath();
      ctx.moveTo(cx - ls * 0.2, cy - ls);
      ctx.lineTo(cx - ls * 0.5, cy + ls * 0.1);
      ctx.lineTo(cx + ls * 0.1, cy - ls * 0.1);
      ctx.lineTo(cx + ls * 0.2, cy + ls);
      ctx.lineTo(cx + ls * 0.5, cy - ls * 0.1);
      ctx.lineTo(cx - ls * 0.1, cy + ls * 0.1);
      ctx.closePath();
      ctx.fillStyle = '#667eea';
      ctx.fill();
    }

    drawIcon(document.getElementById('c16'));
    drawIcon(document.getElementById('c48'));
    drawIcon(document.getElementById('c128'));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BossSay - 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(180deg, #4FACFE 0%, #00F2FE 30%, #E0F7FA 70%, #F0F9FF 100%);
      color: #333;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* 云朵装饰 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(ellipse 180px 60px at 5% 10%, rgba(255,255,255,0.9) 0%, transparent 70%),
        radial-gradient(ellipse 220px 70px at 90% 15%, rgba(255,255,255,0.85) 0%, transparent 70%),
        radial-gradient(ellipse 150px 50px at 20% 35%, rgba(255,255,255,0.75) 0%, transparent 70%),
        radial-gradient(ellipse 200px 65px at 75% 45%, rgba(255,255,255,0.8) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* 光晕效果 */
    body::after {
      content: '';
      position: fixed;
      top: -150px;
      right: -150px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, rgba(200,230,255,0.25) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }

    header h1 {
      font-size: 32px;
      background: linear-gradient(135deg, #4FACFE 0%, #00F2FE 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      text-shadow: 0 2px 8px rgba(79,172,254,0.3);
    }

    header p {
      color: #555;
      font-size: 15px;
    }

    .section {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(79, 172, 254, 0.15);
      border: 1px solid rgba(200, 230, 255, 0.5);
      position: relative;
      overflow: hidden;
    }

    .section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #4FACFE, #00F2FE);
    }

    .section h2 {
      font-size: 19px;
      color: #444;
      margin-bottom: 22px;
      padding-bottom: 14px;
      border-bottom: 2px solid rgba(200, 230, 255, 0.5);
      position: relative;
    }

    .section h2::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, #4FACFE, #00F2FE);
    }

    .form-group {
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #444;
      margin-bottom: 10px;
    }

    .form-group .required {
      color: #FF6B6B;
      font-size: 12px;
    }

    .form-group .optional {
      color: #aaa;
      font-size: 12px;
      font-weight: 400;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid rgba(0,180,216,0.3);
      border-radius: 14px;
      font-size: 14px;
      color: #333;
      background: rgba(255,255,255,0.8);
      transition: all 0.3s ease;
      font-family: inherit;
      backdrop-filter: blur(4px);
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #00B4D8;
      box-shadow: 0 0 0 4px rgba(0,180,216,0.15);
      background: #fff;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.7;
    }

    .form-group .help-text {
      font-size: 12px;
      color: #aaa;
      margin-top: 8px;
    }

    .preset-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .preset-btn {
      padding: 12px 16px;
      background: rgba(255,255,255,0.8);
      border: 2px solid rgba(0,180,216,0.3);
      border-radius: 12px;
      font-size: 13px;
      color: #00B4D8;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }

    .preset-btn:hover {
      background: linear-gradient(135deg, #4FACFE 0%, #00F2FE 100%);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(79,172,254,0.4);
      transform: translateY(-2px);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 28px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4FACFE 0%, #00F2FE 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 20px rgba(79, 172, 254, 0.5);
      transform: translateY(-2px);
    }

    .btn-block {
      display: flex;
      width: 100%;
    }

    .btn-danger {
      background: linear-gradient(135deg, #FF6B6B 0%, #ee5a24 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
    }

    .btn-danger:hover {
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.5);
      transform: translateY(-2px);
    }

    .success-msg {
      display: none;
      padding: 14px 18px;
      background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
      border: 1px solid rgba(150, 230, 161, 0.6);
      border-radius: 14px;
      color: #27ae60;
      font-size: 14px;
      margin-top: 18px;
    }

    .error-msg {
      display: none;
      padding: 14px 18px;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      border: 1px solid rgba(252, 182, 159, 0.6);
      border-radius: 14px;
      color: #c0392b;
      font-size: 14px;
      margin-top: 18px;
    }

    .danger-zone {
      margin-top: 44px;
      padding-top: 28px;
      border-top: 2px solid rgba(255,107,107,0.4);
    }

    .danger-zone h3 {
      font-size: 17px;
      color: #FF6B6B;
      margin-bottom: 18px;
    }

    footer {
      text-align: center;
      margin-top: 44px;
      padding-top: 24px;
      border-top: 1px solid rgba(200,230,255,0.5);
      color: #aaa;
      font-size: 13px;
    }

    footer a {
      color: #00B4D8;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎯 BossSay 设置</h1>
      <p>配置你的个人信息和 AI 模型，让 AI 为你生成最精准的打招呼消息</p>
    </header>

    <!-- 个人信息 -->
    <div class="section">
      <h2>👤 个人信息</h2>

      <div class="form-group">
        <label>简历内容 <span class="required">*</span></label>
        <textarea id="opt-resume" rows="5" placeholder="粘贴你的简历关键内容，或简历摘要..."></textarea>
        <p class="help-text">包含你的教育背景、工作经历、项目经验等关键信息</p>
      </div>

      <div class="form-group">
        <label>个人经历 <span class="required">*</span></label>
        <textarea id="opt-experience" rows="4" placeholder="你的核心工作经历、重要项目经历等..."></textarea>
      </div>

      <div class="form-group">
        <label>技能标签 <span class="required">*</span></label>
        <input type="text" id="opt-skills" placeholder="如：React, Vue, Node.js, Python, Java...">
        <p class="help-text">用逗号分隔你的主要技术栈和技能</p>
      </div>

      <div class="form-group">
        <label>学校/学历 <span class="optional">选填</span></label>
        <input type="text" id="opt-education" placeholder="如：兰州大学 本科 计算机科学">
      </div>

      <div class="form-group">
        <label>到岗时间 <span class="optional">选填</span></label>
        <input type="text" id="opt-available-date" placeholder="如：随时到岗 / 7月15日后">
      </div>

      <div class="form-group">
        <label>实习时长 <span class="optional">选填</span></label>
        <input type="text" id="opt-internship-duration" placeholder="如：可实习6个月 / 长期实习">
      </div>

      <div class="form-group">
        <label>求职类型 <span class="optional">选填</span></label>
        <select id="opt-job-type">
          <option value="">请选择</option>
          <option value="实习">实习</option>
          <option value="全职">全职/正职</option>
          <option value="都可">都可以</option>
        </select>
      </div>

      <div class="form-group">
        <label>转正意愿 <span class="optional">选填</span></label>
        <select id="opt-want-fulltime">
          <option value="">请选择</option>
          <option value="希望转正">希望转正</option>
          <option value="可以转正">可以转正</option>
          <option value="暂不考虑">暂不考虑</option>
          <option value="仅实习">仅实习</option>
        </select>
      </div>

      <div class="form-group">
        <label>GitHub 仓库 <span class="optional">选填</span></label>
        <input type="text" id="opt-github" placeholder="GitHub 用户名或重点仓库链接">
      </div>

      <div class="form-group">
        <label>作品集链接 <span class="optional">选填</span></label>
        <input type="text" id="opt-portfolio" placeholder="个人网站、作品集、博客等 URL">
      </div>

      <div class="form-group">
        <label>自我介绍 <span class="optional">选填</span></label>
        <textarea id="opt-selfintro" rows="3" placeholder="一段通用的自我介绍，帮助 AI 更了解你的风格和特点..."></textarea>
      </div>

      <button class="btn btn-primary btn-block" id="btn-save-profile">💾 保存个人信息</button>
      <div class="success-msg" id="profile-success">✅ 个人信息已保存</div>
    </div>

    <!-- AI 模型配置 -->
    <div class="section">
      <h2>🤖 AI 模型配置</h2>

      <div class="form-group">
        <label>API 地址 <span class="required">*</span></label>
        <input type="text" id="opt-api-url" placeholder="如：https://dashscope.aliyuncs.com/compatible-mode/v1">
        <p class="help-text">OpenAI 兼容的 API 端点地址</p>
      </div>

      <div class="form-group">
        <label>API Key <span class="required">*</span></label>
        <input type="password" id="opt-api-key" placeholder="你的 API Key">
      </div>

      <div class="form-group">
        <label>模型名称 <span class="required">*</span></label>
        <input type="text" id="opt-model" placeholder="如：qwen-turbo, glm-4-flash, deepseek-chat">
      </div>

      <div class="form-group">
        <label>快速选择预设模型</label>
        <div class="preset-list">
          <button class="preset-btn" data-url="https://api.deepseek.com/v1" data-model="deepseek-chat">
            🟣 DeepSeek Chat ⭐推荐
          </button>
          <button class="preset-btn" data-url="https://dashscope.aliyuncs.com/compatible-mode/v1" data-model="qwen-turbo">
            🟢 通义千问 (qwen-turbo)
          </button>
          <button class="preset-btn" data-url="https://open.bigmodel.cn/api/paas/v4" data-model="glm-4-flash">
            🔵 智谱 GLM-4-Flash
          </button>
          <button class="preset-btn" data-url="https://api.moonshot.cn/v1" data-model="moonshot-v1-8k">
            🌙 Moonshot v1
          </button>
        </div>
      </div>

      <button class="btn btn-primary btn-block" id="btn-save-api">💾 保存 API 配置</button>
      <div class="success-msg" id="api-success">✅ API 配置已保存</div>
    </div>

    <!-- 危险操作 -->
    <div class="section danger-zone">
      <h3>⚠️ 危险操作</h3>
      <button class="btn btn-danger btn-block" id="btn-clear-all">🗑️ 清除所有数据</button>
      <p class="help-text" style="margin-top:8px">清除后所有保存的个人信息和配置将丢失，不可恢复</p>
    </div>

    <footer>
      <p>BossSay v2.0.0 · MIT License</p>
    </footer>
  </div>

  <script src="../lib/storage.js"></script>
  <script>
    (function () {
      'use strict';

      // 加载数据
      async function loadData() {
        try {
          // 加载个人信息
          const profileResp = await chrome.runtime.sendMessage({ type: 'GET_PROFILE' });
          if (profileResp?.success) {
            const p = profileResp.profile;
            document.getElementById('opt-resume').value = p.bossSay_resume || '';
            document.getElementById('opt-experience').value = p.bossSay_experience || '';
            document.getElementById('opt-skills').value = p.bossSay_skills || '';
            document.getElementById('opt-education').value = p.bossSay_education || '';
            document.getElementById('opt-available-date').value = p.bossSay_availableDate || '';
            document.getElementById('opt-internship-duration').value = p.bossSay_internshipDuration || '';
            document.getElementById('opt-job-type').value = p.bossSay_jobType || '';
            document.getElementById('opt-want-fulltime').value = p.bossSay_wantFulltime || '';
            document.getElementById('opt-github').value = p.bossSay_github || '';
            document.getElementById('opt-portfolio').value = p.bossSay_portfolio || '';
            document.getElementById('opt-selfintro').value = p.bossSay_selfIntro || '';
          }

          // 加载 API 配置
          const apiResp = await chrome.runtime.sendMessage({ type: 'GET_API_CONFIG' });
          if (apiResp?.success) {
            const c = apiResp.config;
            document.getElementById('opt-api-url').value = c.baseUrl || '';
            document.getElementById('opt-api-key').value = c.apiKey || '';
            document.getElementById('opt-model').value = c.modelName || '';
          }
        } catch (e) {
          console.error('加载数据失败:', e);
        }
      }

      // 保存个人信息
      document.getElementById('btn-save-profile').addEventListener('click', async () => {
        const profile = {
          bossSay_resume: document.getElementById('opt-resume').value.trim(),
          bossSay_experience: document.getElementById('opt-experience').value.trim(),
          bossSay_skills: document.getElementById('opt-skills').value.trim(),
          bossSay_education: document.getElementById('opt-education').value.trim(),
          bossSay_availableDate: document.getElementById('opt-available-date').value.trim(),
          bossSay_internshipDuration: document.getElementById('opt-internship-duration').value.trim(),
          bossSay_jobType: document.getElementById('opt-job-type').value,
          bossSay_wantFulltime: document.getElementById('opt-want-fulltime').value,
          bossSay_github: document.getElementById('opt-github').value.trim(),
          bossSay_portfolio: document.getElementById('opt-portfolio').value.trim(),
          bossSay_selfIntro: document.getElementById('opt-selfintro').value.trim(),
        };

        if (!profile.bossSay_resume && !profile.bossSay_experience) {
          alert('请至少填写简历或个人经历中的一项');
          return;
        }

        try {
          const resp = await chrome.runtime.sendMessage({ type: 'SAVE_PROFILE', data: profile });
          if (resp?.success) {
            const el = document.getElementById('profile-success');
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
          }
        } catch (e) {
          alert('保存失败：' + e.message);
        }
      });

      // 保存 API 配置
      document.getElementById('btn-save-api').addEventListener('click', async () => {
        const config = {
          baseUrl: document.getElementById('opt-api-url').value.trim(),
          apiKey: document.getElementById('opt-api-key').value.trim(),
          modelName: document.getElementById('opt-model').value.trim(),
        };

        if (!config.apiKey || !config.baseUrl || !config.modelName) {
          alert('请填写完整的 API 配置');
          return;
        }

        if (!config.baseUrl.endsWith('/')) {
          config.baseUrl += '/';
        }

        try {
          const resp = await chrome.runtime.sendMessage({ type: 'SAVE_API_CONFIG', data: config });
          if (resp?.success) {
            const el = document.getElementById('api-success');
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
          }
        } catch (e) {
          alert('保存失败：' + e.message);
        }
      });

      // 预设模型
      document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.getElementById('opt-api-url').value = btn.dataset.url;
          document.getElementById('opt-model').value = btn.dataset.model;
        });
      });

      // 清除数据
      document.getElementById('btn-clear-all').addEventListener('click', async () => {
        if (!confirm('确定要清除所有数据吗？此操作不可撤销。')) return;
        try {
          await chrome.storage.local.clear();
          window.location.reload();
        } catch (e) {
          alert('清除失败：' + e.message);
        }
      });

      loadData();
    })();
  </script>
</body>
</html>
